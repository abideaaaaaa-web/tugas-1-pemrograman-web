<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Utama - Muqbil Ábid Al-Hafidz</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1a1a2e; /* Sama dengan CV & Kontak */
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
        color: #f5e6d3;
      }

      /* Canvas for Sparks */
      #sparks-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      /* Container */
      .container {
        position: relative;
        z-index: 10;
        max-width: 550px;
        margin: 80px auto;
        padding: 45px 40px;
        background: linear-gradient(135deg, #1a2332 0%, #2d3748 100%);
        border-radius: 15px;
        border: 1px solid rgba(74, 157, 142, 0.2);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInUp 0.8s ease forwards;
      }

      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Header */
      .header {
        text-align: center;
        margin-bottom: 35px;
      }

      .profile-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #4a9d8e;
        box-shadow: 0 8px 25px rgba(74, 157, 142, 0.4);
        margin-bottom: 18px;
        transition: transform 0.3s ease;
      }

      .profile-img:hover {
        transform: scale(1.05) rotate(3deg);
      }

      h1 {
        font-size: 2.2em;
        color: #f5e6d3;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
      }

      .subtitle {
        color: #8696a0;
        font-size: 1em;
        line-height: 1.6;
      }

      .highlight {
        color: #4a9d8e;
        font-weight: 600;
      }

      /* Menu List */
      .menu-list {
        list-style: none;
        padding: 0;
      }

      .menu-item {
        margin-bottom: 14px;
        opacity: 0;
        transform: translateX(-20px);
        animation: slideIn 0.6s ease forwards;
      }

      .menu-item:nth-child(1) {
        animation-delay: 0.2s;
      }
      .menu-item:nth-child(2) {
        animation-delay: 0.35s;
      }
      .menu-item:nth-child(3) {
        animation-delay: 0.5s;
      }
      .menu-item:nth-child(4) {
        animation-delay: 0.65s;
      }

      @keyframes slideIn {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .menu-item a {
        display: flex;
        align-items: center;
        padding: 16px 22px;
        background: linear-gradient(180deg, #1e3a47 0%, #264653 100%);
        color: #f5e6d3;
        text-decoration: none;
        border-radius: 12px;
        transition: all 0.3s ease;
        font-size: 1.05em;
        font-weight: 500;
        border: 2px solid rgba(74, 157, 142, 0.2);
        position: relative;
        overflow: hidden;
      }

      .menu-item a::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(74, 157, 142, 0.2),
          transparent
        );
        transition: left 0.5s ease;
      }

      .menu-item a:hover::before {
        left: 100%;
      }

      .menu-item a:hover {
        background: linear-gradient(180deg, #264653 0%, #1e3a47 100%);
        border-color: #4a9d8e;
        transform: translateX(8px);
        box-shadow: 0 8px 25px rgba(74, 157, 142, 0.3);
      }

      .menu-icon {
        margin-right: 14px;
        font-size: 1.3em;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #4a9d8e 0%, #3d8577 100%);
        border-radius: 10px;
        flex-shrink: 0;
        transition: transform 0.3s ease;
      }

      .menu-item a:hover .menu-icon {
        transform: rotate(10deg) scale(1.1);
      }

      .menu-text {
        flex: 1;
      }

      .menu-arrow {
        color: #4a9d8e;
        font-size: 1.1em;
        opacity: 0;
        transform: translateX(-10px);
        transition: all 0.3s ease;
      }

      .menu-item a:hover .menu-arrow {
        opacity: 1;
        transform: translateX(0);
      }

      /* Footer */
      .footer {
        text-align: center;
        margin-top: 30px;
        color: #8696a0;
        font-size: 0.88em;
        padding-top: 20px;
        border-top: 1px solid rgba(74, 157, 142, 0.2);
      }

      .footer i {
        color: #4a9d8e;
        margin: 0 4px;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .container {
          margin: 50px auto;
          padding: 30px 25px;
          max-width: 92%;
        }

        h1 {
          font-size: 1.75em;
        }

        .profile-img {
          width: 100px;
          height: 100px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Sparks Canvas -->
    <canvas id="sparks-canvas"></canvas>

    <!-- Main Content -->
    <div class="container">
      <div class="header">
        <img
          src="media/WhatsApp Image 2026-04-16 at 14.06.31"
          alt="Profile"
          class="profile-img"
        />
        <h1>Muqbil Ábid Al-Hafidz</h1>
        <p class="subtitle">
          Mahasiswa <span class="highlight">Video Creator</span> | Samarinda<br />
          Selamat datang di portfolio digital ku! 🎬
        </p>
      </div>

      <ul class="menu-list">
        <li class="menu-item">
          <a href="story_BF5.html">
            <span class="menu-icon">📖</span>
            <span class="menu-text">Story BF5</span>
            <span class="menu-arrow">→</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="cv.html">
            <span class="menu-icon"><i class="fas fa-file-alt"></i></span>
            <span class="menu-text">Curriculum Vitae</span>
            <span class="menu-arrow">→</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="kontak.html">
            <span class="menu-icon"><i class="fas fa-envelope"></i></span>
            <span class="menu-text">Kontak</span>
            <span class="menu-arrow">→</span>
          </a>
        </li>
        <li class="menu-item">
          <a href="#footer">
            <span class="menu-icon"><i class="fas fa-info-circle"></i></span>
            <span class="menu-text">Tentang Website Ini</span>
            <span class="menu-arrow">→</span>
          </a>
        </li>
      </ul>

      <p class="footer">
        © 2024 — <i class="fas fa-code"></i> Designed with
        <i class="fas fa-heart"></i> by Muqbil
      </p>
    </div>

    <!-- COMPLETE Sparks Animation Script -->
    <script>
      // Canvas Setup
      const canvas = document.getElementById("sparks-canvas");
      const ctx = canvas.getContext("2d");

      let sparks = [];
      const MAX_SPARKS = 30;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      // Spark Class - COMPLETED!
      class Spark {
        constructor() {
          this.reset();
        }

        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;

          // Theme colors (biru-hijau sesuai website)
          const colors = [
            "#4a9d8e", // Primary green
            "#3d8577", // Darker green
            "#5fb3a3", // Lighter green
            "#8696a0", // Grey-blue
            "#667781", // Dark grey
          ];
          this.color = colors[Math.floor(Math.random() * colors.length)];

          this.velocityX = (Math.random() - 0.3) * 0.8;
          this.velocityY = (Math.random() - 0.5) * 0.4;

          this.alpha = Math.random() * 0.4 + 0.2;
          this.size = Math.random() * 2 + 0.5;

          // Twinkle effect
          this.twinkleSpeed = Math.random() * 0.02 + 0.01;
          this.twinkleDirection = 1;
        }

        update() {
          this.x += this.velocityX;
          this.y += this.velocityY;

          // Twinkle effect
          this.alpha += this.twinkleSpeed * this.twinkleDirection;
          if (this.alpha > 0.5) {
            this.alpha = 0.5;
            this.twinkleDirection = -1;
          }
          if (this.alpha < 0.1) {
            this.alpha = 0.1;
            this.twinkleDirection = 1;
          }

          // Reset when off screen
          if (
            this.x > canvas.width + 10 ||
            this.x < -10 ||
            this.y > canvas.height + 10 ||
            this.y < -10
          ) {
            this.reset();
            // Start from edge
            if (Math.random() > 0.5) {
              this.x = -5;
            } else {
              this.y = -5;
            }
          }
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.globalAlpha = this.alpha;
          ctx.fill();
          ctx.globalAlpha = 1;

          // Glow effect
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.globalAlpha = this.alpha * 0.3;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      // Initialize sparks
      function initSparks() {
        sparks = [];
        for (let i = 0; i < MAX_SPARKS; i++) {
          sparks.push(new Spark());
        }
      }

      // Animation Loop - COMPLETED!
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        sparks.forEach((spark) => {
          spark.update();
          spark.draw();
        });

        requestAnimationFrame(animate);
      }

      // Start animation
      initSparks();
      animate();

      // Add mouse interaction
      document.addEventListener("mousemove", (e) => {
        // Occasionally add extra spark near mouse
        if (Math.random() > 0.95) {
          const spark = new Spark();
          spark.x = e.clientX + (Math.random() - 0.5) * 50;
          spark.y = e.clientY + (Math.random() - 0.5) * 50;
          spark.size = Math.random() * 3 + 1;
          spark.alpha = 0.8;
          sparks.push(spark);

          // Remove old spark if too many
          if (sparks.length > MAX_SPARKS + 10) {
            sparks.shift();
          }
        }
      });
    </script>
  </body>
</html>
